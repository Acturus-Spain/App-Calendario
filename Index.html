<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bullet Planner Pro</title>
    
    <!-- Estas etiquetas eliminan la barra de búsqueda en Android e iOS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mi Agenda">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Icono de la App -->
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/4f46e5/white?text=BP">
    <link rel="icon" sizes="192x192" href="https://placehold.co/192x192/4f46e5/white?text=BP">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        .task-bullet { transition: all 0.2s ease; }
        .summary-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s;
            opacity: 0;
        }
        .summary-container.open {
            max-height: 300px;
            opacity: 1;
            margin-top: 0.5rem;
        }
        
        /* Calendario adaptable */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .calendar-day { 
            aspect-ratio: 1 / 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            cursor: pointer; 
            border-radius: 12px; 
            font-size: 0.875rem;
        }
        .calendar-day.selected { background-color: #4f46e5 !important; color: white; }
        .pending-dot { 
            width: 4px; height: 4px; 
            background-color: #6366f1; 
            border-radius: 50%; 
            position: absolute; 
            bottom: 4px; 
        }
        .selected .pending-dot { background-color: white; }

        /* Ajustes para evitar zoom en inputs de iOS */
        input, textarea, button { font-size: 16px !important; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div class="max-w-md mx-auto pb-24">
        <header class="p-6 pb-2">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Mi Agenda</h1>
            <p class="text-slate-500 text-sm">Organización diaria</p>
        </header>

        <!-- Calendario Compacto -->
        <section class="px-4 mb-6">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-4">
                <div class="flex items-center justify-between mb-4">
                    <h3 id="calendarMonth" class="font-bold text-slate-700 text-sm uppercase tracking-widest">Mes Año</h3>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 bg-slate-50 rounded-xl text-slate-400 active:scale-90 transition-transform">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button onclick="changeMonth(1)" class="p-2 bg-slate-50 rounded-xl text-slate-400 active:scale-90 transition-transform">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="calendar-grid mb-1">
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">L</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">M</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">X</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">J</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">V</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">S</div>
                    <div class="text-center text-[10px] font-bold text-slate-300 uppercase">D</div>
                </div>
                <div id="calendarBody" class="calendar-grid"></div>
            </div>
        </section>

        <main class="px-4">
            <div class="mb-4 flex items-end justify-between px-2">
                <div>
                    <h2 class="font-bold text-lg text-slate-800" id="currentDateDisplay">Hoy</h2>
                    <p id="taskCounter" class="text-xs text-slate-400 font-medium">0 pendientes</p>
                </div>
            </div>

            <div id="taskList" class="space-y-3">
                <!-- Tareas dinámicas -->
            </div>
        </main>

        <!-- Barra de entrada flotante (fijada abajo para móviles) -->
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent pointer-events-none">
            <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl border border-slate-100 p-3 pointer-events-auto">
                <div class="flex gap-2 mb-2">
                    <input type="text" id="taskInput" placeholder="Nueva tarea..." 
                        class="flex-1 px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <input type="time" id="timeInput" 
                        class="w-24 px-2 py-3 bg-slate-50 border-none rounded-xl text-xs font-bold text-indigo-600 outline-none">
                </div>
                <button onclick="addTask()" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-transform shadow-lg shadow-indigo-200">
                    Añadir Tarea
                </button>
            </div>
        </div>
    </div>

    <script>
        let tasksByDate = JSON.parse(localStorage.getItem('bulletTasks')) || {};
        let currentViewDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        window.onload = () => {
            renderCalendar();
            renderTasks();
        };

        function saveToStorage() {
            localStorage.setItem('bulletTasks', JSON.stringify(tasksByDate));
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calendarBody');
            const monthDisplay = document.getElementById('calendarMonth');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const startingDay = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            monthDisplay.innerText = new Intl.DateTimeFormat('es-ES', { month: 'short', year: 'numeric' }).format(currentViewDate);
            let html = '';
            for (let i = 0; i < startingDay; i++) html += `<div class="calendar-day opacity-0"></div>`;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const hasPending = tasksByDate[dateStr] && tasksByDate[dateStr].some(t => !t.completed);
                html += `
                    <div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected ? 'selected' : ''}">
                        <span class="font-bold">${day}</span>
                        ${hasPending ? '<div class="pending-dot"></div>' : ''}
                    </div>
                `;
            }
            body.innerHTML = html;
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            renderTasks();
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderCalendar();
        }

        function addTask() {
            const textInput = document.getElementById('taskInput');
            const timeInput = document.getElementById('timeInput');
            if (!textInput.value.trim()) return;

            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                time: timeInput.value || "--:--",
                completed: false,
                summary: ""
            };

            if (!tasksByDate[selectedDateStr]) tasksByDate[selectedDateStr] = [];
            tasksByDate[selectedDateStr].push(newTask);
            saveToStorage();
            renderTasks();
            textInput.value = '';
        }

        function toggleTask(id) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, completed: !t.completed} : t);
            saveToStorage();
            renderTasks();
        }

        function deleteTask(id) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].filter(t => t.id !== id);
            saveToStorage();
            renderTasks();
        }

        function updateSummary(id, text) {
            tasksByDate[selectedDateStr] = tasksByDate[selectedDateStr].map(t => t.id === id ? {...t, summary: text} : t);
            localStorage.setItem('bulletTasks', JSON.stringify(tasksByDate));
            const icon = document.getElementById(`icon-${id}`);
            if(icon) text.trim() ? icon.classList.remove('hidden') : icon.classList.add('hidden');
        }

        function toggleSummary(id) {
            document.getElementById(`summary-${id}`).classList.toggle('open');
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const dayTasks = tasksByDate[selectedDateStr] || [];
            
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            document.getElementById('currentDateDisplay').innerText = new Intl.DateTimeFormat('es-ES', options).format(new Date(selectedDateStr + "T00:00:00"));
            document.getElementById('taskCounter').innerText = `${dayTasks.filter(t => !t.completed).length} pendientes`;

            if (dayTasks.length === 0) {
                list.innerHTML = `<div class="py-12 text-center text-slate-300 font-medium bg-white rounded-2xl border border-dashed">Sin tareas</div>`;
                return;
            }

            list.innerHTML = dayTasks.map(t => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleTask(${t.id})" class="w-6 h-6 rounded-full border-2 ${t.completed ? 'bg-indigo-500 border-indigo-500' : 'border-slate-200'} flex items-center justify-center">
                            ${t.completed ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>' : ''}
                        </button>
                        <div class="flex-1" onclick="toggleSummary(${t.id})">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold ${t.completed ? 'line-through text-slate-300' : 'text-slate-700'}">${t.text}</span>
                                <svg id="icon-${t.id}" class="w-3 h-3 text-indigo-400 ${t.summary ? '' : 'hidden'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2"/></svg>
                            </div>
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${t.time}</span>
                        </div>
                        <button onclick="deleteTask(${t.id})" class="p-2 text-slate-200 hover:text-red-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg></button>
                    </div>
                    <div id="summary-${t.id}" class="summary-container">
                        <textarea oninput="updateSummary(${t.id}, this.value)" placeholder="Añadir notas..." 
                            class="w-full mt-2 p-3 bg-slate-50 border-none rounded-xl text-xs text-slate-600 outline-none h-24 resize-none">${t.summary || ''}</textarea>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
